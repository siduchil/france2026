nav{display:flex;justify-content:space-around;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid var(--border);z-index:100;padding:.3rem 0;box-shadow:0 -2px 12px rgba(0,0,0,.06)}
nav button{background:none;border:none;color:var(--muted);font-size:.65rem;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:.4rem .5rem;border-radius:8px;transition:all .2s}
nav button .icon{font-size:1.4rem}
nav button.active{color:var(--accent);background:rgba(232,87,42,.08)}
.container{max-width:900px;margin:0 auto;padding:.8rem}
.tab{display:none}.tab.active{display:block}
.card{background:var(--card);border-radius:14px;padding:1rem;margin-bottom:.7rem;border-left:4px solid var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.05);transition:transform .15s}

.card.urgent{border-left-color:var(--red);background:#fff5f5}
.card.done{opacity:.45;border-left-color:var(--border)}

function switchTab(id){

function detectLocation(){
if(!navigator.geolocation){document.getElementById('loc-banner').textContent='📍 Location unavailable — showing all info';return}
navigator.geolocation.getCurrentPosition(pos=>{
userLat=pos.coords.latitude;userLng=pos.coords.longitude;
let minD=Infinity;
TRIP_DATA.cities.forEach(c=>{
const d=Math.sqrt(Math.pow(c.lat-userLat,2)+Math.pow(c.lng-userLng,2));
if(d<minD){minD=d;currentCity=c}
});
if(minD>2)currentCity=null;
const banner=document.getElementById('loc-banner');
if(currentCity){
banner.innerHTML=`📍 Near <strong>${currentCity.name}</strong> — showing relevant info`;
banner.style.color='var(--green)';
}else{
banner.textContent='📍 Not near any trip city — showing full trip overview';
banner.style.color='var(--muted)';
}
renderHome();renderChecklist();
},()=>{document.getElementById('loc-banner').textContent='📍 Location denied — showing all info';renderHome()});
}

function renderTaskList(filter){
const el=document.getElementById('task-list');

TRIP_DATA.tasks.forEach(t=>{

const cls=st==='done'?'card done':st==='skip'?'card not-needed':'card'+(isUrgent(t.deadline)?' urgent':'');

});

function isUrgent(d){
if(!d||d==='ASAP')return true;
const now=new Date();
const match=d.match(/(\d{1,2})\s*(Apr|May)/i);
if(!match)return false;
const month=match[2].toLowerCase()==='apr'?3:4;
const target=new Date(2026,month,parseInt(match[1]));
return(target-now)/(1000*60*60*24)<=3;
}

function setTask(id,state){const s=S('tasks');s[id]=state;W('tasks',s);renderTasks();renderHome()}

document.querySelectorAll('.filter-row .btn').forEach(b=>{b.classList.remove('active-done')});

renderTaskList(f);
}

{day:15,date:"Sat 16 May",from:"Reims (Écueil)",to:"London (Folkestone)",lat1:49.167,lng1:3.967,lat2:51.094,lng2:1.130,km:170,time:"2 hrs to Calais",depart:"13:30",arrive:"Calais by 15:30",notes:"Le Shuttle 17:24. Leave by 13:30. Morning in Reims for last croissant + champagne shopping. SWITCH TO LEFT IN UK!"}
];

function renderMap(){
var el=document.getElementById('tab-map');
var totalKm=MAP_ROUTE.reduce(function(s,r){return s+r.km},0);
// France bounding box for scaling
var minLat=43.0,maxLat=51.5,minLng=1.0,maxLng=7.5;
var W=340,H=480;
function toX(lng){return 30+((lng-minLng)/(maxLng-minLng))*W}
function toY(lat){return 20+((maxLat-lat)/(maxLat-minLat))*H}

var svg='<svg viewBox="0 0 400 540" style="width:100%;max-width:400px;margin:0 auto;display:block">';
// France outline (simplified)
svg+='<path d="M120,30 L180,25 L220,35 L280,30 L320,50 L350,90 L370,150 L360,220 L340,280 L350,340 L320,380 L280,420 L240,460 L200,480 L160,470 L120,440 L80,400 L60,340 L50,280 L55,220 L70,160 L80,100 L100,60 Z" fill="#f5eed9" stroke="#d4c9a8" stroke-width="1.5"/>';

// Draw route lines
for(var i=0;i<MAP_ROUTE.length;i++){
var r=MAP_ROUTE[i];
if(r.km===0)continue;
var x1=toX(r.lng1),y1=toY(r.lat1),x2=toX(r.lng2),y2=toY(r.lat2);
var col=r.km>400?'#dc2626':r.km>200?'#ea8c1a':'#16a34a';
svg+='<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+col+'" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>';
}

// Draw city dots and labels
var cities={};
MAP_ROUTE.forEach(function(r){
if(!cities[r.to]){cities[r.to]={lat:r.lat2,lng:r.lng2,day:r.day}}
});
// Add London
cities["London"]={lat:51.094,lng:1.130,day:0};

Object.keys(cities).forEach(function(name){
var c=cities[name];
var x=toX(c.lng),y=toY(c.lat);
var isRest=MAP_ROUTE.find(function(r){return r.to===name&&r.km===0});
var col=isRest?'#16a34a':'#e8572a';
svg+='<circle cx="'+x+'" cy="'+y+'" r="5" fill="'+col+'" stroke="#fff" stroke-width="1.5"/>';
var short=name.replace(' (Martailly)','').replace(' (Folkestone)','').replace(' (Écueil)','').replace('Cagnes-sur-Mer','Nice area').replace('Aix-en-Provence','Aix').replace('St Paul de Vence','St Paul');
var anchor=x>250?'end':'start';
var dx=x>250?-8:8;
svg+='<text x="'+(x+dx)+'" y="'+(y+4)+'" font-size="9" fill="#1a1a2e" text-anchor="'+anchor+'" font-family="system-ui" font-weight="600">'+short+'</text>';
});

svg+='</svg>';

// Build schedule
var h='<h2 style="margin:.5rem 0">🗺️ Route Map & Driving Schedule</h2>';
h+='<div style="text-align:center;margin:.5rem 0"><span style="font-size:2rem;font-weight:800;background:linear-gradient(135deg,#f7a44c,#e8572a);-webkit-background-clip:text;-webkit-text-fill-color:transparent">'+totalKm+' km</span><br><span style="color:var(--muted);font-size:.85rem">Total distance · 15 days · 12 cities</span></div>';
h+='<div style="display:flex;gap:.5rem;justify-content:center;margin:.5rem 0;font-size:.75rem"><span style="display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;border-radius:50%;background:#16a34a;display:inline-block"></span> Rest day</span><span style="display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;border-radius:50%;background:#ea8c1a;display:inline-block"></span> Medium drive</span><span style="display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;border-radius:50%;background:#dc2626;display:inline-block"></span> Long drive</span></div>';
h+=svg;

h+='<h3 style="margin:1.2rem 0 .6rem;color:var(--accent)">📅 Driving Schedule</h3>';

MAP_ROUTE.forEach(function(r){
var barPct=Math.min(r.km/500*100,100);
var col=r.km===0?'#16a34a':r.km>400?'#dc2626':r.km>200?'#ea8c1a':'#16a34a';
var icon=r.km===0?'😴':r.km>400?'🔴':r.km>200?'🟠':'🟢';

h+='<div class="card" style="border-left-color:'+col+'">';
h+='<div style="display:flex;justify-content:space-between;align-items:center">';
h+='<div><strong>Day '+r.day+'</strong> <span style="color:var(--muted);font-size:.8rem">'+r.date+'</span></div>';
h+='<span style="font-size:.8rem">'+icon+' '+r.km+' km · '+r.time+'</span></div>';
h+='<div style="font-size:.9rem;margin:.3rem 0">'+r.from+' → '+r.to+'</div>';

if(r.km>0){
h+='<div style="display:flex;gap:1rem;font-size:.8rem;color:var(--muted);margin:.3rem 0">';
h+='<span>🕐 Depart: <strong style="color:var(--text)">'+r.depart+'</strong></span>';
h+='<span>🏁 Arrive: <strong style="color:var(--text)">'+r.arrive+'</strong></span></div>';
h+='<div class="progress-bar" style="height:6px;margin:.3rem 0"><div style="width:'+barPct+'%;height:100%;border-radius:6px;background:'+col+'"></div></div>';
}

h+='<div style="font-size:.8rem;color:var(--muted)">'+r.notes+'</div>';
h+='</div>';
});

// Summary stats
h+='<div class="home-card sand" style="margin-top:1rem"><h3>📊 Trip Stats</h3>';
h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-top:.5rem;text-align:center">';
var driveDays=MAP_ROUTE.filter(function(r){return r.km>0}).length;
var restDays=MAP_ROUTE.filter(function(r){return r.km===0}).length;
var longDays=MAP_ROUTE.filter(function(r){return r.km>400}).length;
h+='<div><div style="font-size:1.5rem;font-weight:700;color:var(--accent)">'+totalKm+'</div><div style="font-size:.7rem;color:var(--muted)">Total km</div></div>';
h+='<div><div style="font-size:1.5rem;font-weight:700;color:var(--green)">'+restDays+'</div><div style="font-size:.7rem;color:var(--muted)">Rest days</div></div>';
h+='<div><div style="font-size:1.5rem;font-weight:700;color:var(--red)">'+longDays+'</div><div style="font-size:.7rem;color:var(--muted)">Long drives (400km+)</div></div>';
h+='</div></div>';

h+='<div class="home-card sea"><h3>💡 Solo Driver Rules</h3><ul style="margin-left:1rem">';
h+='<li>Stop every 90 minutes — no exceptions</li>';
h+='<li>Leave early on long days (before 9am)</li>';
h+='<li>No driving after dark</li>';
h+='<li>Hardest days: Day 1 (456km), Day 13 (487km)</li>';
h+='<li>Day 13 is day 12 of driving — cumulative fatigue is real. Mandatory lunch stop halfway.</li>';
h+='</ul></div>';

el.innerHTML=h;
}
renderMap();

</script>

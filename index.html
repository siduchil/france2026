<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>France Trip Planner</title>
    <style>
        body {
            background-color: #f5f5dc; /* light beige */
            color: #333;
            font-family: Arial, sans-serif;
        }
        .navbar {
            background-color: #ffa500; /* orange */
            padding: 10px;
            text-align: center;
        }
        .navbar a {
            color: white;
            padding: 14px 20px;
            text-decoration: none;
        }
        .tab {
            display: inline-block;
        }
        .city-card {
            border: 1px solid #007bff; /* blue border */
            margin: 10px;
            padding: 10px;
            border-radius: 5px;
        }
        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: #ffa500;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="tab"><a href="#home">Home</a></div>
        <div class="tab"><a href="#tasks">Tasks</a></div>
        <div class="tab"><a href="#route">Route</a></div>
        <div class="tab"><a href="#checklist">Checklist</a></div>
        <div class="tab"><a href="#phrases">Phrases</a></div>
        <div class="tab"><a href="#contacts">Contacts</a></div>
    </div>

    <div id="content">
        <h1>Welcome to your France Trip Planner!</h1>
        <div class="city-card">
            <h2>Day 1: Activity & Restaurant Information</h2>
            <p>Activities: ...</p>
            <p>Restaurants: ...</p>
            <p>Dog Walks: ...</p>
        </div>
        <!-- Add 14 more city cards for the remaining days -->
    </div>

    <script>
        // JavaScript for task tracking, countdown timer, localStorage for checkboxes, etc.

        // Example of location detection
        function detectLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(showPosition);
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        }
        function showPosition(position) {
            console.log("Latitude: " + position.coords.latitude + " Longitude: " + position.coords.longitude);
        }

        detectLocation();
    </script>

    <footer>
        <p>Countdown to your trip: <span id="countdown">10 days</span></p>
    </footer>
</body>
</html>

function detectLocation(){

TRIP_DATA.cities.forEach(c=>{

function isUrgent(d){
if(!d||d==='ASAP'||d.indexOf('ASAP')>-1)return true;
var now=new Date();
var match=d.match(/(\d{1,2})\s*(Apr|May)/i);
if(!match)return false;
var month=match[2].toLowerCase()==='apr'?3:4;
var target=new Date(2026,month,parseInt(match[1]));
return(target-now)/(1000*60*60*24)<=3;
}

function toX(lng){return 30+((lng-minLng)/(maxLng-minLng))*W}
function toY(lat){return 20+((maxLat-lat)/(maxLat-minLat))*H}

function getTimeOfDay(){
var h=new Date().getHours();
if(h<12)return 'morning';
if(h<17)return 'afternoon';
return 'evening';
}

function getCityFromLocation(){
if(!userLat)return null;
var minD=Infinity,best=null;
TRIP_DATA.cities.forEach(function(c){
var d=Math.sqrt(Math.pow(c.lat-userLat,2)+Math.pow(c.lng-userLng,2));
if(d<minD){minD=d;best=c}
});
return minD<2?best:null;
}

h+='<h2>'+c.days+' — '+c.name+'</h2>';
h+='<p>'+c.date+' · 🚗 '+c.drive.km+'km '+c.drive.time+' from '+c.drive.from+' · 🏨 '+c.stay.name+' '+c.stay.cost+'</p>';
h+='</div><div class="city-body" style="display:none">';
h+='<div class="section-title">🏨 Stay</div>';
h+='<div class="poi"><strong>'+c.stay.name+'</strong> · '+c.stay.cost;
if(c.stay.url)h+=' <a href="'+c.stay.url+'" target="_blank" style="font-size:.75rem">📍 Map</a>';
h+='<div class="sub">'+(c.stay.notes||'')+'</div></div>';
h+='<div class="section-title">🚗 Drive</div>';
h+='<div class="poi"><strong>'+c.drive.from+' → '+c.name+'</strong> · '+c.drive.km+'km · '+c.drive.time+'<div class="sub">'+c.drive.notes+'</div></div>';
if(c.dogWalks&&c.dogWalks.length){
h+='<div class="section-title">🐕 Dog Walks</div>';
c.dogWalks.forEach(function(w){h+='<a href="'+w.url+'" target="_blank" class="poi">'+w.name+'</a>'});
}
if(c.activities&&c.activities.length){
h+='<div class="section-title">🎯 Things to Do</div>';
c.activities.forEach(function(a){h+='<a href="'+a.url+'" target="_blank" class="poi '+(a.dogOk===true?'':'no-dog')+'">'+(a.dogOk===true?'✅':'⚠️')+' '+a.name+'<div class="sub">'+a.desc+'</div></a>'});
}
if(c.eats&&c.eats.length){
h+='<div class="section-title">🍽️ Where to Eat</div>';
c.eats.forEach(function(e){h+='<a href="'+e.url+'" target="_blank" class="poi '+(e.type==='indian'?'indian':'')+'">'+(e.type==='indian'?'🍛':'🍽️')+' '+e.name+'<div class="sub">'+e.desc+'</div></a>'});
}
if(c.shops&&c.shops.length){
h+='<div class="section-title">🛍️ Shopping</div>';
c.shops.forEach(function(s){h+='<a href="'+s.url+'" target="_blank" class="poi">🛒 '+s.name+'</a>'});
}
h+='</div></div>';
});
el.innerHTML=h;
}

function renderContacts(){
var el=document.getElementById('tab-contacts');
var cats=[{id:'emergency',label:'🚨 Emergency'},{id:'car',label:'🚗 Car & Breakdown'},{id:'dog',label:'🐕 Dog / Vet'},{id:'stay',label:'🏨 Accommodation'},{id:'booking',label:'📅 Bookings'},{id:'travel',label:'🚄 Travel'}];
var h='<h2 style="margin:.5rem 0">📞 Important Contacts</h2>';
cats.forEach(function(cat){
var items=TRIP_DATA.contacts.filter(function(c){return c.category===cat.id});
if(!items.length)return;
h+='<h3 style="margin:.8rem 0 .4rem;color:var(--accent);font-size:.9rem">'+cat.label+'</h3>';
items.forEach(function(c){
var hasPhone=c.phone.match(/[\d+]/);
var tel=hasPhone?'<a href="tel:'+c.phone.replace(/\s/g,'')+'" class="call-btn">📞 Call</a>':'<span style="color:var(--muted);font-size:.8rem">'+c.phone+'</span>';
h+='<div class="contact-card"><div><strong style="font-size:.9rem">'+c.name+'</strong><br><span style="color:var(--muted);font-size:.8rem">'+c.phone+'</span></div>'+tel+'</div>';
});
});
h+='<h3 style="margin:1rem 0 .4rem;color:var(--accent);font-size:.9rem">📝 Your Notes</h3>';
h+='<textarea id="contact-notes" class="notes-input" rows="6" placeholder="Add phone numbers, booking refs, etc..." oninput="localStorage.setItem(\'ft_contact_notes\',this.value)" style="font-size:.85rem"></textarea>';
el.innerHTML=h;
var cn=document.getElementById('contact-notes');
if(cn)cn.value=localStorage.getItem('ft_contact_notes')||'';
}

function renderExplore(selectedCity,selectedTime){
var el=document.getElementById('tab-explore');
var city=selectedCity||null;
var timeOfDay=selectedTime||getTimeOfDay();

// Build city options
var cityKeys=Object.keys(EXPLORE_DATA);
var cityLabels={versailles:'Versailles',beaune:'Beaune',avignon:'Avignon',stpaul:'St Paul de Vence / Èze',nice:'Nice / Cagnes-sur-Mer',aix:'Aix-en-Provence',montpellier:'Montpellier',lyon:'Lyon',dijon:'Dijon',reims:'Reims',home:'Home'};

// Auto-detect
var autoCity=getCityFromLocation();
if(!city&&autoCity){city=autoCity.id}
if(!city){city='versailles'}

var h='<h2 style="margin:.5rem 0">✨ What To Do Now</h2>';

// City selector
h+='<div style="display:flex;gap:.5rem;margin-bottom:.8rem;flex-wrap:wrap">';
h+='<select id="explore-city" onchange="renderExplore(this.value,document.getElementById(\'explore-time\').value)" style="flex:1;padding:.5rem;background:var(--card);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:.85rem;font-family:inherit">';
cityKeys.forEach(function(k){
if(k==='home')return;
var sel=k===city?' selected':'';
h+='<option value="'+k+'"'+sel+'>'+(cityLabels[k]||k)+'</option>';
});
h+='</select>';

// Time selector
h+='<select id="explore-time" onchange="renderExplore(document.getElementById(\'explore-city\').value,this.value)" style="padding:.5rem;background:var(--card);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:.85rem;font-family:inherit">';
['morning','afternoon','evening'].forEach(function(t){
var sel=t===timeOfDay?' selected':'';
var icon=t==='morning'?'🌅':t==='afternoon'?'☀️':'🌙';
h+='<option value="'+t+'"'+sel+'>'+icon+' '+t.charAt(0).toUpperCase()+t.slice(1)+'</option>';
});
h+='</select></div>';

if(autoCity&&autoCity.id===city){
h+='<div style="color:var(--green);font-size:.8rem;margin-bottom:.5rem">📍 Auto-detected: near '+cityLabels[city]+'</div>';
}

// Show activities for selected city and time
var data=EXPLORE_DATA[city];
if(!data){el.innerHTML=h+'<p style="color:var(--muted)">No data for this city.</p>';return}

var timeIcon=timeOfDay==='morning'?'🌅':timeOfDay==='afternoon'?'☀️':'🌙';
var timeLabel=timeOfDay.charAt(0).toUpperCase()+timeOfDay.slice(1);

// Current time section
var items=data[timeOfDay]||[];
if(items.length){
h+='<h3 style="margin:.8rem 0 .5rem;color:var(--accent)">'+timeIcon+' '+timeLabel+' in '+(cityLabels[city]||city)+'</h3>';
items.forEach(function(item){
if(!item)return;
var parts=item.split('|');
var text=parts[0];
var url=parts[1]||'';
var isIndian=text.toLowerCase().indexOf('indian')>-1;
h+='<div class="poi'+(isIndian?' indian':'')+'" style="cursor:'+(url?'pointer':'default')+'"'+(url?' onclick="window.open(\''+url+'\',\'_blank\')"':'')+'>'+text+(url?' <span style="color:var(--accent2);font-size:.75rem">📍 Map</span>':'')+'</div>';
});
}

// Show other times as collapsed sections
var otherTimes=['morning','afternoon','evening'].filter(function(t){return t!==timeOfDay});
otherTimes.forEach(function(t){
var tIcon=t==='morning'?'🌅':t==='afternoon'?'☀️':'🌙';
var tItems=data[t]||[];
if(!tItems.length||!tItems[0])return;
h+='<div style="margin-top:.8rem"><h3 style="color:var(--muted);font-size:.85rem;cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'">'+tIcon+' '+t.charAt(0).toUpperCase()+t.slice(1)+' <span style="font-size:.75rem">▼</span></h3>';
h+='<div style="display:none">';
tItems.forEach(function(item){
if(!item)return;
var parts=item.split('|');
var text=parts[0];
var url=parts[1]||'';
var isIndian=text.toLowerCase().indexOf('indian')>-1;
h+='<div class="poi'+(isIndian?' indian':'')+'" style="cursor:'+(url?'pointer':'default')+'"'+(url?' onclick="window.open(\''+url+'\',\'_blank\')"':'')+'>'+text+(url?' <span style="color:var(--accent2);font-size:.75rem">📍 Map</span>':'')+'</div>';
});
h+='</div></div>';
});

// Dog reminder
h+='<div class="home-card sea" style="margin-top:1rem"><h3>🐕 Titli Reminder</h3><p>All ✨ activities are dog-friendly unless marked "take turns". France terraces always welcome dogs — just ask for an outdoor table.</p></div>';

el.innerHTML=h;
}


renderTasks();renderItinerary();renderContacts();renderHome();renderMap();renderExplore();renderPhrases();detectLocation();
</script>
</body>
</html>
